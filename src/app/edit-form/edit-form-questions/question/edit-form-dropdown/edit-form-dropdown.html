<div class="options-container">
  <ul [class]="{'options-list': formStateService.isFocused(parentComponentId()) || options().length}">
    @for (option of options(); track option.id) {
      <li>
        <app-edit-form-dropdown-option
          [parentComponentId]="parentComponentId()"
          [option]="option"
          [disableRemove]="!formStateService.isFocused(parentComponentId())"
          (remove)="removeOption(option.id)"
          (optionTextChange)="onOptionTextChange($event)"
          (canSaveQuestion)="onOptionCanSaveChange(option.id, $event)"
        />
      </li>
    }
  </ul>
  @if (formStateService.isFocused(parentComponentId())) {
    <button class="add-option-button" matButton="outlined" (click)="onAddOptionClick()">Add option</button>
  }
</div>
