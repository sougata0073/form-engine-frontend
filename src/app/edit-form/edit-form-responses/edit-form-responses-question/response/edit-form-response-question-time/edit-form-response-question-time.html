<div class="parent-container">
  <mat-card appearance="raised" class="card-container">
    <mat-card-content class="question-card-content no-padding-card">
      <p class="question">{{ response().question ?? 'Question' }}</p>
    </mat-card-content>
  </mat-card>
  @for (response of response().responses; track $index) {
    <mat-card appearance="raised" class="card-container">
      <mat-card-content class="response-card-content no-padding-card">
        <div class="time-parent">
          <p class="time-label">Time</p>
          <div class="time-container">
            <div class="time-value-container">
              <p class="value">{{ response.time | date:'HH' }}</p>
            </div>
            <div class="time-divider">
              <p class="divider">:</p>
            </div>
            <div class="time-value-container">
              <p class="value">{{ response.time | date:'mm' }}</p>
            </div>
          </div>
        </div>
        <div class="response-count">
          <button class="square-text-button" [matMenuTriggerFor]="responseIdsMenu"
                  matButton>{{ response.responseCount + ' responses' }}
          </button>
        </div>
        <mat-menu #responseIdsMenu="matMenu" class="decorated-menu">
          @for (id of response.responseIds; track id) {
            <button mat-menu-item (click)="onResponseIdClick(id)">
              <span>{{ getFormResponseSummaryFromFormResponseId(id)?.responderUserName }}</span>
            </button>
          }
        </mat-menu>
      </mat-card-content>
    </mat-card>
  }
  @if (showQuestionLeftBlank()) {
    <app-edit-form-responses-question-blank-response
      [responseCount]="blankResponseCount()"
      [responseSummaries]="blankResponseSummaries()"
      (responseIdClick)="onResponseIdClick($event)"/>
  }
</div>
