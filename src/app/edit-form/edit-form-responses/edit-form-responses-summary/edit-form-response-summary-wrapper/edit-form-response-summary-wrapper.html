<mat-card appearance="raised" class="card-container">
  <mat-card-content class="card-content-container no-padding-card">
    <div class="response-info-container">
      <p class="question">{{ responseSummary().question }}</p>
      <p class="response-count">{{ responseSummary().numberOfResponses }} responses</p>
    </div>
    @if (responseSummary().numberOfResponses === '0') {
      <p class="no-response-text">No responses yet for this question.</p>
    } @else {
      <div>
        <ng-template #componentHost/>
      </div>
    }
  </mat-card-content>
</mat-card>
