<div class="parent-container">
  <app-edit-form-header [formId]="formId()" class="header"/>

  <div class="main-content-container">
    <div
      class="main-content"
      [class.loading]="editFormStateService.isFormGettingModified()">
      <router-outlet/>
    </div>

    @if (editFormStateService.isFormGettingModified()) {
      <div class="loader-overlay">
        <mat-spinner/>
      </div>
    }
  </div>
</div>
