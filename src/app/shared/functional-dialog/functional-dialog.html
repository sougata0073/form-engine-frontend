<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>{{ data.description }}</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="data.onBtn1Click()">{{ data.btn1Text }}</button>
  <button matButton="filled" cdkFocusInitial (click)="data.onBtn2Click()">
    {{ data.btn2Text }}
  </button>
</mat-dialog-actions>
