<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.description }}</p>
  <mat-form-field>
    <input matInput [formControl]="formControl"/>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="data.btn1Click()">{{ data.btn1Text }}</button>
  <button matButton (click)="data.btn2Click()" [mat-dialog-close]="formControl.value"
          cdkFocusInitial>{{ data.btn2Text }}
  </button>
</mat-dialog-actions>
