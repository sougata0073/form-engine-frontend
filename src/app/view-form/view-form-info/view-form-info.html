<app-question-card [isTopItem]="true">

    <div class="form-info-container">
      <p class="title">{{ formRes().title }}</p>
      <p>{{ formRes().description }}</p>
    </div>

      <p class="warning">* Indicates required question</p>
    </div>
  </div>
</app-question-card>
